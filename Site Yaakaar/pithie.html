<div class="logo-container">
  <img src="images/logo1.png" class="logo" />
  <h1 class="title">YAAKAAR</h1>
  <p class="subtitle">TAKKU SUXALI WALO</p>
</div>

<style>
.logo-container {
  text-align: center;
  background: #7aa0c4;
  padding: 40px;
  border-radius: 50%;
  width: 300px;
  margin: auto;
}

.logo {
  width: 120px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

.title {
  color: #f4c542;
  margin-top: 10px;
  opacity: 0;
  animation: slideUp 2s ease forwards;
  animation-delay: 1s;
}

.subtitle {
  color: white;
  font-size: 14px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 2s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
