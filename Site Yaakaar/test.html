<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Yaakaar - Maintenance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* BACKGROUND */
.background {
    position: absolute;
    width: 110%;
    height: 110%;
    background: url('images/drapeau.png') no-repeat center/cover;
    animation: wave 10s ease-in-out infinite alternate;
    z-index: -2;
}

@keyframes wave {
    0% { transform: scale(1.05) translateX(0px); }
    100% { transform: scale(1.08) translateX(25px); }
}

/* OVERLAY */
.overlay-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    z-index: -1;
}

/* CONTENU */
.container {
    text-align: center;
    padding: 40px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
}

/* HEADER */
.brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 25px;
}

.logo {
    width: 80px;
    height: 80px;
    object-fit: cover;
}

.brand-text {
    text-align: left;
}

/* TITRE */
.brand-text h1 {
    font-size: 38px;
    color: #FFD700;
    margin-bottom: 6px;
}

/* TRAIT ROUGE */
.line {
    width: 100%;
    height: 3px;
    background: #1a8fe3;
    margin-bottom: 6px;
}

/* SOUS TEXTE */
.brand-text p {
    font-size: 16px;
    color: #ddd;
}

/* MESSAGE */
.message {
    margin-top: 15px;
}

.message p {
    font-size: 16px;
    opacity: 0.9;
}

/* LOADER */
.loader {
    margin: 25px auto;
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255,255,255,0.2);
    border-top: 5px solid #FFD700;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.footer {
    position: absolute;
    bottom: 20px;
    font-size: 14px;
    opacity: 0.8;
}
/* SIGNATURE DEV */
.signature {
    margin-top: 5px;
    font-size: 12px;
    opacity: 0.5;
    letter-spacing: 1px;
}

.signature span {
    color: #FFD700;
    font-weight: bold;
	font-style: italic;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay-bg"></div>

<div class="container">

    <div class="brand">
        <img src="images/logo1.png" alt="Logo Yaakaar" class="logo">

        <div class="brand-text">
            <h1>YAAKAAR</h1>
            <div class="line"></div>
            <p>Takku Suxali Walo</p>
        </div>
    </div>

    <div class="message">
        <p>Site en maintenance</p>
        <p>Merci de patienter...</p>
    </div>

    <div class="loader"></div>

</div>

<div class="footer">
    © Yaakaar 2026  
	 <div class="signature">
        Dev by <span>SKadiar Design</span>
    </div>
</div>

</body>
</html>
